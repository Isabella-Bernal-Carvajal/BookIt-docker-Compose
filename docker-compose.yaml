services:

  db:
    image: postgres:17-alpine
    container_name: bookit-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - server

  backend:
    image: isabell4/bookit-backend:latest
    container_name: bookit-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env   
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - server
      - web

  frontend:
    image: isabell4/bookit-frontend:latest
    container_name: bookit-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file:
      - .env  
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - web

volumes:
  postgres_data:

networks:
  server:
    driver: bridge
  web:
    driver: bridge